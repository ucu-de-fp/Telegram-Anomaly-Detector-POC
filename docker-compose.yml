services:

  postgres:
    profiles: ["infra"]
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    container_name: monitoring-postgres
    environment:
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring123
      POSTGRES_MULTIPLE_DATABASES: admin,notification
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    profiles: ["infra"]
    image: rabbitmq:3.13-management
    container_name: monitoring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: monitoring
      RABBITMQ_DEFAULT_PASS: monitoring123
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  admin-api-service:
    profiles: ["app"]
    build:
      context: ./admin-api-service
      dockerfile: Dockerfile
    container_name: admin-api-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/admin
      SPRING_DATASOURCE_USERNAME: monitoring
      SPRING_DATASOURCE_PASSWORD: monitoring123
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring-network

  notification-service:
    profiles: ["app"]
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/notification
      SPRING_R2DBC_USERNAME: monitoring
      SPRING_R2DBC_PASSWORD: monitoring123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: monitoring
      SPRING_RABBITMQ_PASSWORD: monitoring123
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - monitoring-network

  # telegram-ingestion-service:
  #   build:
  #     context: ./telegram-ingestion-service
  #     dockerfile: Dockerfile
  #   container_name: telegram-ingestion-service
  #   environment:
  #     SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/admin
  #     SPRING_R2DBC_USERNAME: monitoring
  #     SPRING_R2DBC_PASSWORD: monitoring123
  #     SPRING_RABBITMQ_HOST: rabbitmq
  #     SPRING_RABBITMQ_PORT: 5672
  #     SPRING_RABBITMQ_USERNAME: monitoring
  #     SPRING_RABBITMQ_PASSWORD: monitoring123
  #   ports:
  #     - "8083:8083"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #   networks:
  #     - monitoring-network

  telegram-ingestion-telethon:
    profiles: ["app"]
    build:
      context: ./telegram-ingestion-service-telethon
      dockerfile: Dockerfile
    container_name: telegram-ingestion-telethon
    restart: unless-stopped
    ports:
      - "8083:8080"    # cache-management HTTP API (avoid clash with other services)
    env_file:
      - ./telegram-ingestion-service-telethon/.env.${APP_ENV:-example}
    # environment:
    #   # ── Profiles (no "test" → live Telegram mode) ──
    #   PROFILES: "${PROFILES}"

    #   # ── Telegram credentials (required in live mode) ──
    #   TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
    #   TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
    #   TELEGRAM_SESSION_NAME: "/app/session/telegram_session"

    #   # ── PostgreSQL (matches Spring R2DBC vars) ──
    #   DB_HOST: postgres
    #   DB_PORT: 5432
    #   DB_NAME: admin
    #   DB_USER: monitoring
    #   DB_PASSWORD: monitoring123

    #   # ── RabbitMQ ──
    #   RABBITMQ_HOST: rabbitmq
    #   RABBITMQ_PORT: 5672
    #   RABBITMQ_USERNAME: monitoring
    #   RABBITMQ_PASSWORD: monitoring123
    #   RABBITMQ_EXCHANGE: telegram.messages
    #   RABBITMQ_ROUTING_KEY: telegram.message.ingested

    #   # ── HTTP API ──
    #   HTTP_HOST: "0.0.0.0"
    #   HTTP_PORT: 8080

    #   LOG_LEVEL: INFO

    volumes:
      # Persist the Telethon session across container restarts.
      # On first run Telethon will prompt for your phone number and OTP;
      # run the container interactively once to generate the session file:
      #   docker compose run --rm telegram-ingestion-telethon
      - telegram_session:/app/session

    networks:
      - monitoring-network

    depends_on:
      - admin-api-service # to initialize DB
      - postgres
      - rabbitmq

  anomaly-detection-service:
    profiles: ["app"]
    build:
      context: ./anomaly-detection-service
      dockerfile: Dockerfile
    container_name: anomaly-detection-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: monitoring
      SPRING_RABBITMQ_PASSWORD: monitoring123
    ports:
      - "8084:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - monitoring-network

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monitoring-frontend
    ports:
      - "3000:80"
    depends_on:
      - admin-api-service
      - notification-service
    networks:
      - monitoring-network

volumes:
  postgres-data:
  telegram_session:

networks:
  monitoring-network:
    driver: bridge
