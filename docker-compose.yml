services:

  postgres:
    profiles: ["infra"]
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    container_name: monitoring-postgres
    environment:
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: monitoring123
      POSTGRES_MULTIPLE_DATABASES: admin,notification
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    profiles: ["infra"]
    image: rabbitmq:3.13-management
    container_name: monitoring-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: monitoring
      RABBITMQ_DEFAULT_PASS: monitoring123
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  admin-api-service:
    profiles: ["app"]
    build:
      context: ./admin-api-service
      dockerfile: Dockerfile
    container_name: admin-api-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/admin
      SPRING_DATASOURCE_USERNAME: monitoring
      SPRING_DATASOURCE_PASSWORD: monitoring123
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - monitoring-network

  notification-service:
    profiles: ["app"]
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/notification
      SPRING_R2DBC_USERNAME: monitoring
      SPRING_R2DBC_PASSWORD: monitoring123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: monitoring
      SPRING_RABBITMQ_PASSWORD: monitoring123
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - monitoring-network

  telegram-ingestion-service:
    profiles: ["app"]
    build:
      context: ./telegram-ingestion-service
      dockerfile: Dockerfile
    container_name: telegram-ingestion-service
    restart: unless-stopped
    ports:
      - "8083:8080"
    env_file:
      - ./telegram-ingestion-service/.env.${APP_ENV:-example}.docker

    volumes:
      - telegram_session:/app/session

    networks:
      - monitoring-network

    depends_on:
      - postgres
      - rabbitmq

  anomaly-detection-service:
    profiles: ["app"]
    build:
      context: ./anomaly-detection-service
      dockerfile: Dockerfile
    container_name: anomaly-detection-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: monitoring
      SPRING_RABBITMQ_PASSWORD: monitoring123
    ports:
      - "8084:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - monitoring-network

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: monitoring-frontend
    ports:
      - "3000:80"
    depends_on:
      - admin-api-service
      - notification-service
    networks:
      - monitoring-network

volumes:
  postgres-data:
  telegram_session:

networks:
  monitoring-network:
    driver: bridge
