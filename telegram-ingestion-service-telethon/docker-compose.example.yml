# docker-compose.example.yml
#
# Example showing how to run telegram-ingestion-service-telethon alongside
# the existing infrastructure.  Copy / merge the relevant service block into
# your project's main docker-compose.yml.
#
# Two profiles are shown:
#   • live  (default)  — reads from Telegram via Telethon
#   • test             — replays a local Telegram Desktop JSON export file
#
# Usage:
#   Live mode:   docker compose up telegram-ingestion-telethon
#   Test mode:   docker compose --profile test up telegram-ingestion-telethon-test

services:

  # ── LIVE MODE ──────────────────────────────────────────────────────────────
  telegram-ingestion-telethon:
    build:
      context: ./telegram-ingestion-service-telethon
      dockerfile: Dockerfile
    container_name: telegram-ingestion-telethon
    restart: unless-stopped
    ports:
      - "8081:8080"    # cache-management HTTP API (avoid clash with other services)
    environment:
      # ── Profiles (no "test" → live Telegram mode) ──
      PROFILES: "prod"

      # ── Telegram credentials (required in live mode) ──
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_SESSION_NAME: "/app/session/telegram_session"

      # ── PostgreSQL (matches Spring R2DBC vars) ──
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: admin
      DB_USER: monitoring
      DB_PASSWORD: monitoring123

      # ── RabbitMQ ──
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: monitoring
      RABBITMQ_PASSWORD: monitoring123
      RABBITMQ_EXCHANGE: telegram.messages
      RABBITMQ_ROUTING_KEY: telegram.message.ingested

      # ── HTTP API ──
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: 8080

      LOG_LEVEL: INFO

    volumes:
      # Persist the Telethon session across container restarts.
      # On first run Telethon will prompt for your phone number and OTP;
      # run the container interactively once to generate the session file:
      #   docker compose run --rm telegram-ingestion-telethon
      - telegram_session:/app/session

    networks:
      - monitoring-network

    depends_on:
      - postgres
      - rabbitmq

  # ── TEST MODE ──────────────────────────────────────────────────────────────
  telegram-ingestion-telethon-test:
    profiles: ["test"]
    build:
      context: ./telegram-ingestion-service-telethon
      dockerfile: Dockerfile
    container_name: telegram-ingestion-telethon-test
    restart: "no"
    ports:
      - "8082:8080"
    environment:
      # "test" in PROFILES activates file-based source
      PROFILES: "test"

      TEST_MESSAGES_FILE: "/app/test_data/result.json"

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: admin
      DB_USER: monitoring
      DB_PASSWORD: monitoring123

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: monitoring
      RABBITMQ_PASSWORD: monitoring123
      RABBITMQ_EXCHANGE: telegram.messages
      RABBITMQ_ROUTING_KEY: telegram.message.ingested

      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: 8080

      LOG_LEVEL: DEBUG

    volumes:
      # Mount a folder containing your Telegram Desktop export (result.json)
      - ./telegram-ingestion-service-telethon/test_data:/app/test_data:ro

    networks:
      - monitoring-network

    depends_on:
      - postgres
      - rabbitmq


volumes:
  telegram_session:
    driver: local

networks:
  monitoring-network:
    external: true    # assumes the network is created by the parent compose file
